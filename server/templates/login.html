<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign in to Veritas</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;700;800&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; background-color: #0f172a; }
        .mono { font-family: 'JetBrains Mono', monospace; }
        input:-webkit-autofill {
            -webkit-box-shadow: 0 0 0 1000px #0f172a inset !important;
            -webkit-text-fill-color: #f1f5f9 !important;
        }
    </style>
</head>
<body class="min-h-screen text-slate-300 flex items-center justify-center p-4">

<div class="w-full max-w-sm">
    <div class="mb-10 text-center">
        <div class="w-12 h-12 bg-indigo-600 rounded-xl flex items-center justify-center mx-auto mb-4 border border-indigo-500/30">
            <svg class="w-6 h-6 text-white" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 2L2 7l10 5 10-5-10-5zM2 17l10 5 10-5M2 12l10 5 10-5"/></svg>
        </div>
        <h1 class="text-2xl font-bold text-white mb-2">Welcome back</h1>
        <p class="text-sm text-slate-400">Sign in to your Veritas account</p>
    </div>

    {% if error %}
    <div class="bg-red-500/10 border border-red-500/20 rounded-lg p-4 mb-6 text-center">
        <p class="text-xs text-red-400 font-semibold uppercase tracking-wider">{{ error }}</p>
    </div>
    {% endif %}

    <form class="space-y-4" action="/auth/login" method="POST">
        <div>
            <label class="block text-xs font-semibold text-slate-400 uppercase tracking-widest mb-2">Username</label>
            <input type="text" name="username" required
                class="w-full bg-slate-900 border border-slate-700 rounded-lg px-4 py-3 text-sm text-white focus:outline-none focus:border-indigo-500 focus:ring-1 focus:ring-indigo-500 transition-colors"
                placeholder="yourusername">
        </div>
        <div>
            <label class="block text-xs font-semibold text-slate-400 uppercase tracking-widest mb-2">Password</label>
            <input type="password" name="password" required
                class="w-full bg-slate-900 border border-slate-700 rounded-lg px-4 py-3 text-sm text-white focus:outline-none focus:border-indigo-500 focus:ring-1 focus:ring-indigo-500 transition-colors"
                placeholder="••••••••">
        </div>
        <div class="pt-2">
            <button type="submit" class="w-full bg-indigo-600 hover:bg-indigo-500 text-white font-semibold rounded-lg px-4 py-3 text-sm transition-colors border border-indigo-500/30">
                Sign In
            </button>
        </div>
    </form>

    <div class="mt-8 text-center">
        <p class="text-sm text-slate-500">Don't have an account? <a href="/auth/signup" class="text-indigo-400 hover:text-indigo-300 font-medium">Request access</a></p>
    </div>
</div>

</body>
</html>
