<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Request Access - Veritas</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;700;800&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; background-color: #0f172a; }
        .mono { font-family: 'JetBrains Mono', monospace; }
        input:-webkit-autofill {
            -webkit-box-shadow: 0 0 0 1000px #0f172a inset !important;
            -webkit-text-fill-color: #f1f5f9 !important;
        }
    </style>
</head>
<body class="min-h-screen text-slate-300 flex items-center justify-center p-4">

<div class="w-full max-w-sm">
    <div class="mb-10 text-center">
        <div class="w-12 h-12 bg-indigo-600 rounded-xl flex items-center justify-center mx-auto mb-4 border border-indigo-500/30">
            <svg class="w-6 h-6 text-white" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 2L2 7l10 5 10-5-10-5zM2 17l10 5 10-5M2 12l10 5 10-5"/></svg>
        </div>
        <h1 class="text-2xl font-bold text-white mb-2">Join Veritas</h1>
        <p class="text-sm text-slate-400">The LLM cost observability platform</p>
    </div>

    {% if allow_signups %}
    
    {% if error %}
    <div class="bg-red-500/10 border border-red-500/20 rounded-lg p-4 mb-6 text-center">
        <p class="text-xs text-red-400 font-semibold uppercase tracking-wider">{{ error }}</p>
    </div>
    {% endif %}

    <form class="space-y-4" action="/auth/signup" method="POST">
        <div>
            <label class="block text-xs font-semibold text-slate-400 uppercase tracking-widest mb-2">Email</label>
            <input type="email" name="email" required
                class="w-full bg-slate-900 border border-slate-700 rounded-lg px-4 py-3 text-sm text-white focus:outline-none focus:border-indigo-500 focus:ring-1 focus:ring-indigo-500 transition-colors"
                placeholder="you@company.com">
        </div>
        <div>
            <label class="block text-xs font-semibold text-slate-400 uppercase tracking-widest mb-2">Password</label>
            <input type="password" name="password" required minlength="8"
                class="w-full bg-slate-900 border border-slate-700 rounded-lg px-4 py-3 text-sm text-white focus:outline-none focus:border-indigo-500 focus:ring-1 focus:ring-indigo-500 transition-colors"
                placeholder="minimum 8 characters">
        </div>
        <div class="pt-2">
            <button type="submit" class="w-full bg-emerald-600 hover:bg-emerald-500 text-white font-semibold rounded-lg px-4 py-3 text-sm transition-colors border border-emerald-500/30">
                Create Account
            </button>
        </div>
    </form>
    
    {% else %}
    <!-- Invite Only State -->
    <div class="bg-slate-900 border border-slate-800 rounded-xl p-8 mb-6 text-center shadow-xl">
        <div class="w-12 h-12 bg-slate-800 rounded-full flex items-center justify-center mx-auto mb-4 border border-slate-700">
            <svg class="w-5 h-5 text-indigo-400" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="11" width="18" height="11" rx="2" ry="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg>
        </div>
        <h2 class="text-base font-semibold text-white mb-2">Currently Invite-Only</h2>
        <p class="text-sm text-slate-400 leading-relaxed mb-6">Veritas is currently in a closed beta with early design partners.</p>
        <p class="text-xs mono text-slate-500 bg-slate-950 border border-slate-800 py-2 px-3 rounded-lg inline-block">Waitlist opening soon</p>
    </div>
    {% endif %}

    <div class="mt-8 text-center">
        <p class="text-sm text-slate-500">Already have an account? <a href="/auth/login" class="text-indigo-400 hover:text-indigo-300 font-medium">Sign in</a></p>
    </div>
</div>

</body>
</html>
