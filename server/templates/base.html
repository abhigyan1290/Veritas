<!DOCTYPE html>
<html lang="en" class="h-full">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Veritas{% endblock %}</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;900&family=JetBrains+Mono:wght@400;500;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', system-ui, sans-serif; }
        .mono { font-family: 'JetBrains Mono', monospace !important; }
        code, pre, .font-mono { font-family: 'JetBrains Mono', monospace !important; }
        ::-webkit-scrollbar { width: 4px; height: 4px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 2px; }
    </style>
</head>
<body class="h-full bg-slate-50 text-slate-900">
<div class="flex h-screen overflow-hidden">

    <!-- Sidebar -->
    <aside class="w-56 shrink-0 bg-slate-950 flex flex-col border-r border-slate-800">
        <!-- Logo -->
        <div class="h-14 flex items-center px-5 border-b border-slate-800 shrink-0">
            <span class="text-lg font-black tracking-tighter text-white">veri<span class="text-indigo-400">tas</span></span>
        </div>

        <!-- Nav -->
        <nav class="flex-1 px-2 py-3 space-y-0.5 overflow-y-auto">
            <a href="/?project_id={{ project_id }}"
               class="flex items-center gap-3 px-3 py-2 rounded-lg text-sm font-medium transition-all duration-150
               {% if request.url.path == '/' or '/features' in request.url.path %}bg-slate-800 text-white{% else %}text-slate-400 hover:text-slate-100 hover:bg-slate-800/60{% endif %}">
                <svg class="w-4 h-4 shrink-0" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <rect x="3" y="3" width="7" height="7" rx="1"/><rect x="14" y="3" width="7" height="7" rx="1"/>
                    <rect x="14" y="14" width="7" height="7" rx="1"/><rect x="3" y="14" width="7" height="7" rx="1"/>
                </svg>
                Overview
            </a>
            <a href="/regressions?project_id={{ project_id }}"
               class="flex items-center gap-3 px-3 py-2 rounded-lg text-sm font-medium transition-all duration-150
               {% if request.url.path == '/regressions' %}bg-slate-800 text-white{% else %}text-slate-400 hover:text-slate-100 hover:bg-slate-800/60{% endif %}">
                <svg class="w-4 h-4 shrink-0" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <polyline points="23 6 13.5 15.5 8.5 10.5 1 18"/>
                    <polyline points="17 6 23 6 23 12"/>
                </svg>
                Change Detection
            </a>
            <a href="/settings?project_id={{ project_id }}"
               class="flex items-center gap-3 px-3 py-2 rounded-lg text-sm font-medium transition-all duration-150
               {% if request.url.path == '/settings' %}bg-slate-800 text-white{% else %}text-slate-400 hover:text-slate-100 hover:bg-slate-800/60{% endif %}">
                <svg class="w-4 h-4 shrink-0" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <circle cx="12" cy="12" r="3"/>
                    <path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 2.83-2.83l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 2.83l-.06.06A1.65 1.65 0 0 0 19.4 9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/>
                </svg>
                Settings
            </a>
        </nav>

        <!-- Bottom -->
        <div class="px-4 py-3 border-t border-slate-800 shrink-0">
            <span class="text-xs mono text-slate-600">v0.4.0-alpha</span>
        </div>
    </aside>

    <!-- Main -->
    <div class="flex-1 flex flex-col min-w-0 overflow-hidden">

        <!-- Top bar -->
        <header class="h-14 bg-white border-b border-slate-200 flex items-center justify-between px-6 shrink-0">
            <div class="flex items-center gap-2">
                <span class="text-xs font-semibold text-slate-400 uppercase tracking-widest">Project</span>
                <svg class="w-3 h-3 text-slate-300" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="9 18 15 12 9 6"/></svg>
                <select onchange="const path=window.location.pathname; window.location.href=path+'?project_id='+this.value"
                        class="text-sm font-semibold text-slate-800 bg-transparent border-0 focus:ring-0 cursor-pointer appearance-none pr-1">
                    {% for p in projects %}
                    <option value="{{ p.id }}" {% if p.id == project_id %}selected{% endif %}>{{ p.name }}</option>
                    {% endfor %}
                </select>
            </div>
            <div class="flex items-center gap-3">
                <span class="text-xs mono text-slate-400 bg-slate-100 border border-slate-200 px-2 py-1 rounded-md">{{ project_id }}</span>
                <div class="w-7 h-7 rounded-full bg-indigo-600 flex items-center justify-center" title="{{ user.username if user else '' }}">
                    <span class="text-xs font-bold text-white">{{ user.username[0]|upper if user else 'U' }}</span>
                </div>
                <form action="/auth/logout" method="POST" class="ml-2 m-0 flex">
                    <button type="submit" class="text-xs font-semibold text-slate-400 hover:text-red-500 transition-colors">Logout</button>
                </form>
            </div>
        </header>

        <!-- Page content -->
        <main class="flex-1 overflow-y-auto p-6">
            {% block content %}{% endblock %}
        </main>
    </div>
</div>
</body>
</html>
