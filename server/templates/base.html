<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Veritas Cloud Dashboard</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-50 text-gray-900 font-sans">

    <!-- Navigation Bar -->
    <nav class="bg-white shadow-sm border-b border-gray-200 px-6 py-4 flex justify-between items-center">
        <div class="flex items-center space-x-8">
            <h1 class="text-xl font-bold text-gray-800 tracking-tight">VERITAS</h1>
            
            <div class="hidden md:flex space-x-6">
                <a href="/?project_id={{ project_id }}" class="text-gray-600 hover:text-blue-600 font-medium transition">Overview</a>
                <a href="/regressions?project_id={{ project_id }}" class="text-gray-600 hover:text-blue-600 font-medium transition">Regressions</a>
                <a href="/settings?project_id={{ project_id }}" class="text-gray-600 hover:text-blue-600 font-medium transition">Settings</a>
            </div>
        </div>
        
        <!-- Project Selector UX (Fulfilling Tenancy Requirement) -->
        <div class="flex items-center space-x-3">
            <span class="text-sm text-gray-500 font-medium uppercase tracking-wider">Project:</span>
            <form action="" method="GET" class="inline">
                <!-- Retain any other query params like raw_key -> we recreate them dynamically if needed, 
                 but for the dropdown changing projects is usually a clean slate -->
                <select name="project_id" onchange="this.form.submit()" class="bg-gray-100 border border-gray-300 text-gray-800 text-sm rounded focus:ring-blue-500 focus:border-blue-500 block w-40 p-1.5 cursor-pointer">
                    {% for p in projects %}
                    <option value="{{ p.project_id }}" {% if project_id == p.project_id %}selected{% endif %}>{{ p.name }}</option>
                    {% endfor %}
                </select>
            </form>
        </div>
    </nav>

    <!-- Main Content Injection -->
    <main class="max-w-7xl mx-auto px-6 py-8">
        {% block content %}{% endblock %}
    </main>

</body>
</html>
